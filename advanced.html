<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOSS海投助手 - 高级选项</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f4f8ff;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid #e8eef8;
      background: linear-gradient(180deg, rgba(248, 251, 255, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      color: #3774ee;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #64748b;
    }

    .body {
      padding: 20px 22px 22px;
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      color: #475569;
    }

    .field textarea,
    .field input,
    .field select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: #fff;
      color: #0f172a;
      outline: none;
      padding: 12px 14px;
      font: inherit;
    }

    .field input,
    .field select {
      height: 46px;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.55;
    }

    .field textarea:focus,
    .field input:focus,
    .field select:focus {
      border-color: #6da4ff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }

    .hint {
      font-size: 12px;
      color: #7a889d;
    }

    .toggles {
      display: grid;
      gap: 10px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: #f8fbff;
      font-size: 14px;
      color: #334155;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-top: 6px;
    }

    .status {
      font-size: 12px;
      color: #64748b;
    }

    .button {
      height: 42px;
      border: 0;
      border-radius: 12px;
      padding: 0 16px;
      cursor: pointer;
      font: inherit;
    }

    .button.primary {
      background: linear-gradient(180deg, #4d8cff 0%, #2f6ae6 100%);
      color: #fff;
    }

    .button.secondary {
      background: #e9eff8;
      color: #334155;
    }

    .test-output {
      min-height: 72px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fbff;
      border: 1px solid #e2e8f0;
      color: #475569;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="panel">
      <header class="header">
        <h1>BOSS海投助手</h1>
        <p>高级选项</p>
      </header>
      <section class="body">
        <div class="field">
          <label for="salaryKeywords">薪资包含（可选）</label>
          <input id="salaryKeywords" type="text" placeholder="20K, 25-35K" />
        </div>

        <div class="field">
          <label for="companyKeywords">公司名包含（可选）</label>
          <input id="companyKeywords" type="text" placeholder="字节, 腾讯, 外企" />
        </div>

        <div class="field">
          <label for="greetTemplate">打招呼语模板</label>
          <textarea id="greetTemplate" placeholder="支持 {jobTitle} {companyName} {location} {salary}"></textarea>
          <div class="hint">支持变量：{jobTitle} {companyName} {location} {salary}</div>
        </div>

        <div class="field">
          <label for="pollIntervalMs">轮询间隔(ms)</label>
          <input id="pollIntervalMs" type="number" min="600" step="100" />
        </div>

        <div class="toggles">
          <label class="toggle"><input id="autoGreet" type="checkbox" /> 自动打招呼</label>
          <label class="toggle"><input id="autoNext" type="checkbox" /> 自动切下一个</label>
        </div>

        <div class="field">
          <label for="autoReplyEnabled">自动回复开关</label>
          <div class="toggles">
            <label class="toggle"><input id="autoReplyEnabled" type="checkbox" /> 自动回复聊天</label>
          </div>
          <div class="hint">仅在聊天输入框可见时生效，建议谨慎开启。</div>
        </div>

        <div class="field">
          <label for="autoReplyProvider">自动回复服务商</label>
          <select id="autoReplyProvider">
            <option value="doubao">豆包(字节)</option>
            <option value="deepseek">DeepSeek</option>
            <option value="yuanbao">腾讯元宝/混元</option>
          </select>
        </div>

        <div class="field">
          <label for="autoReplySystemPrompt">自动回复提示词</label>
          <textarea id="autoReplySystemPrompt" placeholder="定义你的回复风格、重点信息等"></textarea>
        </div>

        <div class="field">
          <label for="autoReplyTemperature">回复随机度(0-1)</label>
          <input id="autoReplyTemperature" type="number" min="0" max="1" step="0.1" />
        </div>

        <div class="field">
          <label for="autoReplyMaxTokens">回复长度上限</label>
          <input id="autoReplyMaxTokens" type="number" min="64" max="4096" step="64" />
        </div>

        <div class="field">
          <label for="doubaoApiKey">豆包 API Key</label>
          <input id="doubaoApiKey" type="password" placeholder="sk-..." />
        </div>

        <div class="field">
          <label for="doubaoEndpoint">豆包 Endpoint</label>
          <input id="doubaoEndpoint" type="text"
            placeholder="https://ark.cn-beijing.volces.com/api/v3/chat/completions" />
        </div>

        <div class="field">
          <label for="doubaoModel">豆包 Model</label>
          <input id="doubaoModel" type="text" placeholder="填写你的模型ID" />
        </div>

        <div class="field">
          <label for="deepseekApiKey">DeepSeek API Key</label>
          <input id="deepseekApiKey" type="password" placeholder="sk-..." />
        </div>

        <div class="field">
          <label for="deepseekEndpoint">DeepSeek Endpoint</label>
          <input id="deepseekEndpoint" type="text" placeholder="https://api.deepseek.com/chat/completions" />
        </div>

        <div class="field">
          <label for="deepseekModel">DeepSeek Model</label>
          <input id="deepseekModel" type="text" placeholder="deepseek-chat" />
        </div>

        <div class="field">
          <label for="yuanbaoApiKey">腾讯元宝 API Key</label>
          <input id="yuanbaoApiKey" type="password" placeholder="sk-..." />
        </div>

        <div class="field">
          <label for="yuanbaoEndpoint">腾讯元宝 Endpoint</label>
          <input id="yuanbaoEndpoint" type="text"
            placeholder="https://api.hunyuan.cloud.tencent.com/v1/chat/completions" />
        </div>

        <div class="field">
          <label for="yuanbaoModel">腾讯元宝 Model</label>
          <input id="yuanbaoModel" type="text" placeholder="hunyuan-lite" />
        </div>

        <div class="field">
          <label for="autoReplyTestInput">自动回复测试内容</label>
          <textarea id="autoReplyTestInput" placeholder="输入一段测试对话，如：你好方便发份简历过来吗"></textarea>
          <div class="hint">点击测试不会发送到聊天框，仅验证 API 是否可用。</div>
        </div>

        <div class="field">
          <button class="button secondary" type="button" id="autoReplyTestButton">测试自动回复</button>
          <div class="test-output" id="autoReplyTestResult">等待测试。</div>
        </div>

        <div class="footer">
          <div class="status" id="saveStatus">设置会自动保存</div>
          <button class="button primary" type="button" id="closeButton">关闭窗口</button>
        </div>
      </section>
    </section>
  </main>
  <script src="src/advanced.js"></script>
</body>

</html>
